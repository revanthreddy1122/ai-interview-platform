<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock interview · NextInterview AI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/interview.css">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand" style="margin-bottom: var(--space-6);">
                <span class="brand-mark"><img src="../assets/logo.png" alt="NextInterview AI logo"></span>
                 NextInterview AI
            </div>
            <a href="dashboard.html" class="sidebar-link" data-page="dashboard">⌂ Dashboard</a>
            <a href="upload-resume.html" class="sidebar-link" data-page="upload-resume">⇧ Upload resume</a>
            <a href="history.html" class="sidebar-link" data-page="history">⏱ History</a>
            <a href="questions.html" class="sidebar-link" data-page="questions">? Question bank</a>
            <a href="mock-interview.html" class="sidebar-link" data-page="mock-interview">⌨ Mock interview</a>
            <a href="profile.html" class="sidebar-link" data-page="profile">⚇ Profile</a>
        </aside>

        <div style="flex:1; display:flex; flex-direction:column; min-width:0;">
            <div class="topbar">
                <span class="text-secondary" id="current-user-name">—</span>
                <div style="display:flex; align-items:center; gap: var(--space-3);">
                    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">☾</button>
                    <a href="#" class="btn btn-outline btn-sm" id="logout-btn">Log out</a>
                </div>
            </div>

            <main class="page-content" style="padding-bottom:0;">
                <div class="container" style="padding:0; max-width: 820px;">
                    <div style="display:flex; align-items:baseline; justify-content:space-between; flex-wrap:wrap; gap: var(--space-3);">
                        <div>
                            <h1 style="margin-bottom: var(--space-1);">Mock interview</h1>
                            <p class="text-secondary" style="margin-bottom: var(--space-4);">Answer the question below. The AI interviewer scores your response on correctness, completeness, and communication.</p>
                        </div>
                        <button class="btn btn-outline btn-sm" id="new-question-btn">New question</button>
                    </div>

                    <div class="card chat-shell" style="padding:0;">
                        <div class="chat-messages" id="chat-log"></div>
                        <form class="chat-input-bar" id="answer-form">
                            <textarea class="form-control" id="answer-input" placeholder="Type your answer..." required></textarea>
                            <button type="submit" class="btn btn-primary" id="answer-submit">Send</button>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/interview.js"></script>
    <script>
        initMockInterviewPage();
    </script>
</body>
</html>
