<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile ·NextInterview AI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand" style="margin-bottom: var(--space-6);">
                <span class="brand-mark"><img src="../assets/logo.png" alt="NextInterview AI logo"></span>
                NextInterview AI
            </div>
            <a href="dashboard.html" class="sidebar-link" data-page="dashboard">⌂ Dashboard</a>
            <a href="upload-resume.html" class="sidebar-link" data-page="upload-resume">⇧ Upload resume</a>
            <a href="history.html" class="sidebar-link" data-page="history">⏱ History</a>
            <a href="questions.html" class="sidebar-link" data-page="questions">? Question bank</a>
            <a href="mock-interview.html" class="sidebar-link" data-page="mock-interview">⌨ Mock interview</a>
            <a href="profile.html" class="sidebar-link" data-page="profile">⚇ Profile</a>
        </aside>

        <div style="flex:1; display:flex; flex-direction:column; min-width:0;">
            <div class="topbar">
                <span class="text-secondary" id="current-user-name">—</span>
                <div style="display:flex; align-items:center; gap: var(--space-3);">
                    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">☾</button>
                    <a href="#" class="btn btn-outline btn-sm" id="logout-btn">Log out</a>
                </div>
            </div>

            <main class="page-content">
                <div class="container" style="padding:0; max-width: 680px;">
                    <h1>Profile</h1>
                    <p class="text-secondary">Manage your account information and password.</p>

                    <div class="card" style="margin-bottom: var(--space-6);">
                        <h3 class="card-title">Account details</h3>
                        <div id="profile-alert"></div>

                        <form id="profile-form">
                            <div class="form-group">
                                <label class="form-label" for="profile-fullName">Full name</label>
                                <input type="text" class="form-control" id="profile-fullName" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="profile-email">Email address</label>
                                <input type="email" class="form-control" id="profile-email" disabled>
                                <div class="form-hint">Email cannot be changed.</div>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="profile-phoneNumber">Phone number</label>
                                <input type="tel" class="form-control" id="profile-phoneNumber">
                            </div>
                            <div class="grid grid-2" style="margin-bottom: var(--space-5);">
                                <div>
                                    <span class="form-label">Role</span>
                                    <p id="profile-role" class="badge badge-accent">—</p>
                                </div>
                                <div>
                                    <span class="form-label">Member since</span>
                                    <p id="profile-created-at" class="text-secondary">—</p>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary" id="profile-submit">Save changes</button>
                        </form>
                    </div>

                    <div class="card">
                        <h3 class="card-title">Change password</h3>
                        <div id="password-alert"></div>

                        <form id="password-form">
                            <div class="form-group">
                                <label class="form-label" for="currentPassword">Current password</label>
                                <input type="password" class="form-control" id="currentPassword" required autocomplete="current-password">
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="newPassword">New password</label>
                                <input type="password" class="form-control" id="newPassword" required autocomplete="new-password">
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="confirmNewPassword">Confirm new password</label>
                                <input type="password" class="form-control" id="confirmNewPassword" required autocomplete="new-password">
                            </div>
                            <button type="submit" class="btn btn-outline" id="password-submit">Update password</button>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/dashboard.js"></script>
    <script>
        initProfilePage();
    </script>
</body>
</html>
