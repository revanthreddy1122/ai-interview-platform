# =====================================================
# APPLICATION
# =====================================================
spring.application.name=ai-interview-platform
server.port=8080
server.servlet.context-path=/

# =====================================================
# DATABASE CONFIGURATION (MySQL)
# =====================================================
spring.datasource.url=jdbc:mysql://mysql.railway.internal:3306/railway?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =====================================================
# JPA / HIBERNATE CONFIGURATION
# =====================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.sql.init.mode=never

# =====================================================
# FILE UPLOAD CONFIGURATION
# =====================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =====================================================
# JWT CONFIGURATION
# =====================================================
# IMPORTANT: replace this with your own long, random, base64-safe secret in production
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# =====================================================
# OPENROUTER AI CONFIGURATION
# =====================================================
openrouter.api.key=${OPENROUTER_API_KEY}
openrouter.api.url=https://openrouter.ai/api/v1/chat/completions
openrouter.api.model=poolside/laguna-m.1:free

# =====================================================
# SWAGGER / OPENAPI CONFIGURATION
# =====================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# =====================================================
# LOGGING CONFIGURATION
# =====================================================
logging.level.root=INFO
logging.level.com.interviewplatform=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %-5level %logger{36} - %msg%n
logging.file.name=logs/interview-platform.log
logging.file.max-size=10MB
logging.file.max-history=10

# =====================================================
# JACKSON CONFIGURATION
# =====================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
